services:
  - type: web
    name: vidhaan-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_URL
        fromDatabase:
          name: vidhaan-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: vidhaan-db
    ipAllowList: [] # Allow connections from all IPs
